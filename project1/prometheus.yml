global:
  scrape_interval: 5s

rule_files:
  - "alert.rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "localhost:9093"

scrape_configs:
  - job_name: 'flask-app'
    static_configs:
     - targets: ['127.0.0.1:5000']

  - job_name: 'node-exporter'
    static_configs:
       - targets: ['172.27.79.70:9100']
